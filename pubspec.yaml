name: riffnotes
description: Offline-first band practice review for Windows and Kindle Fire.
publish_to: none
version: 0.3.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.7
  path: ^1.9.0
  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7
  shared_preferences: ^2.5.5
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.2
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/google_oauth.json
